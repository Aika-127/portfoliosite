<!DOCTYPE html> 
<html>
  <head>
    <title>おざわあいかのワーク</title>
    <meta charset="UTF-8">
    <meta name="description" content="ワークの一覧です">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aboreto&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="header2">
      <!-- ロゴ -->
      <a href="index.html">
        <img id="logo1" src="image/logo.png" alt="トップページに戻る">
      </a>
      <!-- PCナビゲーション -->
      <nav id="nav-pc">
        <ul class="aboreto-regular">
          <li><a href="index.html">HOME</a></li>
          <li><a href="profile.html">PROFILE</a></li>
          <li><a href="works.html">WORKS</a></li>
          <li><a href="index.html#contact">CONTACT</a></li>
        </ul>
      </nav>
      <!-- スマホ用メニューボタン -->
       <a href="index.html">
        <img class="logo2" src="image/logo.png" alt="トップページに戻る">
      </a>
       <button id="menu-sp" onclick="document.getElementById('nav-sp').style.display='block'">
        <img src="image/hamburger.png" alt="ナビゲーションを開く">
      </button>
      <!-- スマホナビゲーション -->
       <div id="nav-sp">
        <button id="close" onclick="document.getElementById('nav-sp').style.display='none'">
          <img src="image/close.png" alt="ナビゲーションを閉じる">
        </button>
        <nav>
          <a id="logo-sp"href="index.html"onclick="document.getElementById('nav-sp').style.display='none'"><img class="logo2" src="image/logo.png" alt="トップページに戻る"></a> 
          <ul class="aboreto-regular">
            <li><a class="menu"href="index.html" onclick="document.getElementById('nav-sp').style.display='none'">HOME</a></li>
            <li><a class="menu"href="profile.html" onclick="document.getElementById('nav-sp').style.display='none'">PROFILE</a></li>
            <li><a class="menu"href="works.html" onclick="document.getElementById('nav-sp').style.display='none'">WORKS</a></li>
            <li><a class="menu"href="index.html#contact" onclick="document.getElementById('nav-sp').style.display='none'">CONTACT</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <article>
        <section id="works-2">
          <p id="works-p" class="aboreto-regular">WORKS</p>
          <img id="works-ph1" src="image/sc1.png" alt="あああ"> 
          <img id="works-ph2" src="image/sc2.png" alt="あああ">
          <img id="works-ph3" src="image/sc3.png" alt="あああ">
          <img id="works-ph4" src="image/sc4.png" alt="あああ">
          <img id="works-ph5" src="image/sc5.png" alt="あああ">
          <div id="works-info">
            <p class="aboreto-regular works-title">WEBSITE</p>
            <div class="works-flex">
              <div class="works-info-left image-container">
                <img src="image/website1.png" alt="コーポレートサイト" class="zoom-img works-ph" width="440">
                <p class="works-info-p">コーポレートサイト</p>
              </div>
              <div class="works-info-right image-container">
                <img src="image/website2.png" alt="美容室ホームページ" class="zoom-img works-ph" width="440">
                <p class="works-info-p">美容室のホームページ</p>
              </div>
            </div>
            <p class="aboreto-regular works-title">BANNER</p>
            <div class="works-flex">
              <div class="works-info-left image-container">
                <img src="image/banner1.png" alt="チョコレート製品のバナー" class="zoom-img works-ph" width="440">
                <p class="works-info-p">チョコレートのバナー</p>
              </div>
              <div class="works-info-right image-container">
                <img src="image/banner2.png" alt="ハンバーガーのバナー"class="zoom-img works-ph" width="440">
                <p class="works-info-p">ハンバーガーのバナー</p>
              </div>
            </div>
            <p class="aboreto-regular works-title">OTHERS</p>
            <div class="works-flex">
              <div class="works-info-left image-container"> 
                <img src="image/others1.png" alt="YouTubeのサムネイル"class="zoom-img works-ph" width="440">
                <p class="works-info-p">YouTubeのサムネイル</p>
              </div>
              <div class="works-info-right image-container">
                <img src="image/others2.png" alt="化粧品のランディングページ" class="zoom-img works-ph" width="440">
                <p class="works-info-p">化粧品のランディングページ</p>
              </div>
            </div>
          </div>
        </section>
      </article>
    </main>
      <footer id="contact">
      <a href="index.html" id="top page">
        <img id=toppage src="image/top1.png" alt="トップページに戻る" onmouseover="this.src='image/top2.png'" onmouseout="this.src='image/top1.png'">
      </a>
      <div>
        <p id="footer-p">ご覧いただきありがとうございます</p>
        <h1 id="con-h1" class="aboreto-regular">CONTACT</h1>
      </div>
      <div id="sns-footer">
        <div class="sns-btns">
          <a id=instagram href="https://www.instagram.com/aika_webdesigner?igsh=cG9zYWJwd3NkNHU2&utm_source=qr"><img id="instagramsize" src="image/instagram.png" alt="インスタグラムのリンク" onmouseover="this.src='image/instagram2.png'" onmouseout="this.src='image/instagram.png'"></a>
        </div>
        <p id="copyright"></p>
      </div>
      <div id="footer-link">
        <nav>
          <ul class="aboreto-regular">
          <li><a href="index.html">HOME</a></li>
          <li><a href="profile.html">PROFILE</a></li>
          <li><a href="works.html">WORKS</a></li>
          </ul>
        </nav>
      </div>
    </footer>

</html>
